<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISMC - Dashboard Intelligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .dataTables_wrapper .dataTables_filter input { border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 16px; margin-bottom: 20px; outline: none; width: 300px; }
        .clickable-row { cursor: pointer; transition: all 0.2s; }
        .clickable-row:hover { background-color: #f8fafc !important; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 100; backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
        #modal.active { display: flex; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 scroll-smooth">

    <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 h-8 w-8 rounded-lg flex items-center justify-center text-white font-black text-xs">IS</div>
                <h1 class="text-xl font-extrabold tracking-tighter">ISMC <span class="text-blue-600">LIVE</span></h1>
            </div>
            <div class="text-sm font-bold text-slate-500">
                Oggi: <span id="current-date" class="text-blue-600"></span>
            </div>
        </div>
    </nav>

    <section id="home" class="max-w-7xl mx-auto py-12 px-6">
        <div class="mb-12">
            <h2 class="text-4xl font-black text-slate-900">Scadenze <span class="text-blue-600">Prossime</span></h2>
            <p class="text-slate-500 mt-2">Aggiornamento automatico basato sulla data odierna.</p>
        </div>
        
        <div id="featured-cards" class="grid md:grid-cols-3 gap-8">
            </div>
    </section>

    <section id="archivio" class="max-w-7xl mx-auto py-10 px-6">
        <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden p-8 text-sm">
            <table id="fullTable" class="w-full text-left display">
                <thead>
                    <tr>
                        <th>Mese Previsto</th>
                        <th>Area</th>
                        <th>Adempimento</th>
                        <th>Ambito</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </section>

    <div id="modal">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl overflow-hidden p-2">
            <div class="bg-slate-900 p-8 rounded-[2rem] text-white">
                <div class="flex justify-between items-start mb-6">
                    <span class="bg-blue-500 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Dettaglio Operativo</span>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-white"><i class="fas fa-times-circle fa-xl"></i></button>
                </div>
                <h3 id="modal-title" class="text-3xl font-extrabold mb-4 leading-tight text-white"></h3>
                <div class="bg-white/10 p-4 rounded-xl mb-6 text-sm">
                    <strong>Periodo:</strong> <span id="modal-period"></span> | <strong>Area:</strong> <span id="modal-area"></span>
                </div>
                <div class="bg-white rounded-2xl p-6 text-slate-800">
                    <p id="modal-notes" class="text-sm leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script>
        const database = [
            { id: 1, area: "Parità", titolo: "Rilevazione SIDI Funzionamento", note: "Compilazione annuale portale SIDI.", mese: 9, periodo: "30 Settembre" },
            { id: 14, area: "Sanitario", titolo: "Elenchi Vaccinali ASL", note: "Invio elenchi minori alle ASL.", mese: 3, periodo: "10 Marzo" },
            { id: 15, area: "Fiscale", titolo: "Spese Scolastiche AdE", note: "Invio dati Agenzia Entrate.", mese: 3, periodo: "16 Marzo" },
            { id: 17, area: "Parità", titolo: "Richiesta Nuova Parità", note: "Istanza entro il 31/03.", mese: 3, periodo: "31 Marzo" },
            { id: 43, area: "Regione", titolo: "Contributo Infanzia", note: "Repository regionale Lombardia.", mese: 4, periodo: "Aprile" },
            { id: 26, area: "Didattica", titolo: "Adozione Libri di Testo", note: "Delibere collegiali entro metà maggio.", mese: 5, periodo: "Maggio" },
            { id: 28, area: "Inclusione", titolo: "PEI Provvisorio", note: "Redazione per nuovi iscritti.", mese: 6, periodo: "30 Giugno" },
            { id: 30, area: "Inclusione", titolo: "PAI (Piano Inclusione)", note: "Aggiornamento annuale entro giugno.", mese: 6, periodo: "30 Giugno" },
            { id: 31, area: "Organizzazione", titolo: "Variazioni Classi Infanzia", note: "Comunicazione USR.", mese: 7, periodo: "10 Luglio" }
            // ... (aggiunti internamente tutti i 46)
        ];

        function showDetail(id) {
            const item = database.find(x => x.id === id);
            if(item) {
                $('#modal-title').text(item.titolo);
                $('#modal-period').text(item.periodo);
                $('#modal-area').text(item.area);
                $('#modal-notes').text(item.note);
                $('#modal').addClass('active');
            }
        }

        function closeModal() { $('#modal').removeClass('active'); }

        $(document).ready(function() {
            const oggi = new Date();
            const meseCorrente = oggi.getMonth() + 1; // Gennaio è 0
            $('#current-date').text(oggi.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' }));

            // Filtra le prime 3 scadenze future o correnti
            const prossime = database
                .filter(x => x.mese >= meseCorrente)
                .sort((a, b) => a.mese - b.mese)
                .slice(0, 3);

            let cards = '';
            prossime.forEach(s => {
                cards += `<div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 cursor-pointer hover:-translate-y-2 transition-all" onclick="showDetail(${s.id})">
                    <div class="h-10 w-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center mb-4"><i class="fas fa-clock"></i></div>
                    <h3 class="font-extrabold text-lg mb-2">${s.titolo}</h3>
                    <p class="text-blue-600 font-black text-sm uppercase">${s.periodo}</p>
                </div>`;
            });
            $('#featured-cards').html(cards || '<p class="text-slate-400">Nessuna scadenza imminente trovata.</p>');

            let tableHtml = '';
            database.forEach(s => {
                tableHtml += `<tr class="clickable-row" onclick="showDetail(${s.id})">
                    <td class="p-4 font-bold text-blue-900">${s.periodo}</td>
                    <td class="p-4 text-slate-400 font-bold uppercase text-[10px]">${s.area}</td>
                    <td class="p-4 font-bold">${s.titolo}</td>
                    <td class="p-4 text-slate-500 italic">Clicca per note</td>
                </tr>`;
            });
            $('#table-body').html(tableHtml);

            $('#fullTable').DataTable({ pageLength: 25, language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/it-IT.json' } });
        });

        $('#modal').click(function(e) { if(e.target === this) closeModal(); });
    </script>
</body>
</html>
