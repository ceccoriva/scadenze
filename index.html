<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISMC - Registro Adempimenti</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .dataTables_wrapper .dataTables_filter { display: none; }
        .filter-btn.active { background-color: #1e40af; color: white; border-color: #1e40af; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .clickable-row { cursor: pointer; transition: all 0.2s; }
        .clickable-row:hover { background-color: #f1f5f9 !important; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); z-index: 100; backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
        #modal.active { display: flex; }
    </style>
</head>
<body>

    <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50 shadow-sm">

    <main class="max-w-7xl mx-auto py-10 px-6">

            <div id="featured-cards" class="grid md:grid-cols-3 gap-6"></div>

        <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden p-8">

                <h3 class="text-2xl font-black text-slate-800 uppercase tracking-tighter italic">Registro Integrale</h3>
                <div class="relative w-full md:w-80">
                    <i class="fas fa-search absolute left-4 top-3.5 text-slate-400 text-sm"></i>
                    <input type="text" id="customSearch" placeholder="Cerca parola chiave..." class="w-full bg-slate-50 border border-slate-200 rounded-2xl pl-10 pr-4 py-3 text-sm outline-none focus:ring-4 focus:ring-blue-100 transition">
                </div>
            </div>
            <table id="fullTable" class="w-full text-left display">
                <thead>

                        <th>Periodo</th>

                        <th>Adempimento</th>
                        <th>Ambito</th>

                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </main>

    <div id="modal">

                <div class="flex justify-between items-center mb-6">
                    <span class="bg-blue-600 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Dettaglio Nota Operativa</span>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-white transition"><i class="fas fa-times-circle fa-xl"></i></button>
                </div>
                <h3 id="modal-title" class="text-2xl font-black mb-4 leading-tight"></h3>
                <div class="bg-white/10 p-4 rounded-xl text-sm mb-6 space-y-2 border border-white/10 italic">
                    <p><i class="far fa-calendar mr-2 text-blue-400"></i> <span id="modal-period"></span></p>
                    <p><i class="far fa-folder mr-2 text-blue-400"></i> <span id="modal-area"></span></p>
                </div>
                <div class="bg-white rounded-2xl p-6 text-slate-800 shadow-inner">

        </div>
    </div>

            { id: 42, o: 1215, a: "Regione (Lombardia)", t: "Buono scuola", p: "Novembre/dicembre", m: 12, g: 15, n: "Bando regionale Lombardia Buono Scuola.", am: "Lombardia" },
            { id: 43, o: 430, a: "Regione (Lombardia)", t: "Contributo scuole infanzia", p: "Febbraio/aprile", m: 4, g: 30, n: "Finestra regionale dedicata ai contributi scuole infanzia.", am: "Lombardia" },
            { id: 44, o: 715, a: "Regione (Lombardia)", t: "Dote disabilità (Dote H)", p: "Giugno/luglio", m: 7, g: 15, n: "Finestra regionale dote disabilità.", am: "Lombardia" },

            { id: 46, o: 720, a: "Sanitario", t: "Vaccini: comunicazione ASL", p: "20 luglio", m: 7, g: 20, n: "Trasmissione alle ASL mancato deposito certificati.", am: "USR" }
        ];

        let table;

        function showDetail(id) {
            const item = database.find(x => x.id === id);
            if(item) {
                $('#modal-title').text(item.t);
                $('#modal-period').text(item.p);
                $('#modal-area').text(item.a);
                $('#modal-notes').text(item.n);
                $('#modal').addClass('active');
            }
        }
        function closeModal() { $('#modal').removeClass('active'); }

        function filterTable(category) {
            table.search(category).draw();
            $('.filter-btn').removeClass('active');
            event.currentTarget.classList.add('active');
        }

        $(document).ready(function() {
            const oggi = new Date();
            const meseOggi = oggi.getMonth() + 1;
            const giornoOggi = oggi.getDate();
            $('#current-date').text(oggi.toLocaleDateString('it-IT', {day:'numeric', month:'long', year:'numeric'}));

            // Dashboard logica data reale (Prossime 3 scadenze da oggi)
            const imminenti = database
                .filter(x => (x.m > meseOggi) || (x.m === meseOggi && x.g >= giornoOggi))
                .sort((a,b) => {
                    if (a.m !== b.m) return a.m - b.m;
                    return a.g - b.g;
                })
                .slice(0, 3);

            let cardsHtml = '';
            imminenti.forEach(s => {
                cardsHtml += `<div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 cursor-pointer hover:shadow-xl hover:-translate-y-2 transition-all duration-300" onclick="showDetail(${s.id})">
                    <div class="h-10 w-10 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-4"><i class="fas fa-calendar-check"></i></div>
                    <h4 class="font-bold text-slate-800 mb-2 leading-tight">${s.t}</h4>
                    <span class="text-blue-600 font-black text-[10px] uppercase tracking-tighter bg-blue-50 px-2 py-1 rounded-md">${s.p}</span>
                </div>`;
            });
            $('#featured-cards').html(cardsHtml || '<p class="text-slate-400">Nessuna scadenza imminente.</p>');

            let tableHtml = '';
            database.forEach(s => {
                tableHtml += `<tr class="clickable-row" onclick="showDetail(${s.id})">
                    <td class="hidden">${s.o}</td>
                    <td class="p-4 font-bold text-blue-900 border-b border-slate-50 text-sm">${s.p}</td>
                    <td class="p-4 text-[10px] font-bold text-slate-400 border-b border-slate-50 uppercase tracking-tighter">${s.a}</td>
                    <td class="p-4 font-bold border-b border-slate-50 text-sm">${s.t}</td>
                    <td class="p-4 text-slate-500 italic border-b border-slate-50 text-xs">Vedi dettagli</td>
                </tr>`;
            });
            $('#table-body').html(tableHtml);

            table = $('#fullTable').DataTable({ 
                pageLength: 50, 
                order: [[0, 'asc']], 
                language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/it-IT.json' } 
            });

            $('#customSearch').on('keyup', function() {
                table.search(this.value).draw();
            });
        });

        $('#modal').click(function(e) { if(e.target === this) closeModal(); });
    </script>
</body>
</html>
